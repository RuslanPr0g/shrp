name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # cs.zsh is zsh, which ShellCheck doesn't support — only lint
      # install.sh and test/run.sh (matched by name, since ignore_paths
      # only excludes directories, not individual files).
      - uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          ignore_names: 'cs.zsh'

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Install zsh
        run: sudo apt-get update && sudo apt-get install -y zsh
      - name: Run test suite
        run: ./test/run.sh
