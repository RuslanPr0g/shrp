name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # cs.zsh is zsh (ShellCheck doesn't support it) and spec/*.sh are
      # ShellSpec DSL, not standalone scripts (no shebang by design,
      # run via shellspec's own interpreter) — install.sh and
      # run-tests.sh are the real ShellCheck targets here.
      - uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          ignore_names: 'cs.zsh'
          ignore_paths: 'spec'

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Install zsh
        run: sudo apt-get update && sudo apt-get install -y zsh
      - name: Run test suite
        run: ./run-tests.sh
